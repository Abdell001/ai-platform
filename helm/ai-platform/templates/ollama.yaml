apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-v1
  labels:
    app: ollama
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
      version: v1
  template:
    metadata:
      labels:
        app: ollama
        version: v1
    spec:
      containers:
        - name: ollama
          image: ollama/ollama
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-v2
  labels:
    app: ollama
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
      version: v2
  template:
    metadata:
      labels:
        app: ollama
        version: v2
    spec:
      containers:
        - name: ollama
          image: ollama/ollama
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-v1
spec:
  selector:
    app: ollama
    version: v1
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-v2
spec:
  selector:
    app: ollama
    version: v2
  ports:
    - port: 11434
      targetPort: 11434
