apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ai-platform-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: ai-platform
      rules:
        - alert: HighErrorRate
          expr: rate(http_requests_total{status=~"5.."}[2m]) > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High error rate detected"

        - alert: HighLatency
          expr: http_request_duration_seconds{quantile="0.95"} > 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High API latency detected"

        - alert: PodRestartingTooMuch
          expr: rate(kube_pod_container_status_restarts_total[10m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod restarting too frequently"
