name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 app/main.py --max-line-length=120

      - name: Run tests
        run: |
          pip install pytest
          echo "Tests passed (no tests yet)"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t abdell001/ai-api:$IMAGE_TAG ./app
          docker push abdell001/ai-api:$IMAGE_TAG

      - name: Update Helm values with new image tag
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed -i "s/tag: .*/tag: $IMAGE_TAG/" helm/ai-platform/values.yaml

      - name: Commit updated values.yaml
        run: |
          IMAGE_TAG=${{ github.sha }}
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Abdell001/ai-platform.git
          git add helm/ai-platform/values.yaml
          git commit -m "CI: update image tag to $IMAGE_TAG"
          git push
